spring.application.name=esquentaio

# ──────────────────────────────────────────────
# Profile ativo (remover antes de deployar!)
# ──────────────────────────────────────────────
spring.profiles.active=dev

# ──────────────────────────────────────────────
# DevTools — hot reload
# ──────────────────────────────────────────────
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.thymeleaf.cache=false

# ──────────────────────────────────────────────
# Datasource (PostgreSQL)
# ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:esquentaio}
spring.datasource.username=${DB_USER:esquentaio_user}
spring.datasource.password=${DB_PASSWORD:troque_esta_senha_db}
spring.datasource.driver-class-name=org.postgresql.Driver

# ──────────────────────────────────────────────
# JPA / Hibernate
# ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ──────────────────────────────────────────────
# Flyway
# ──────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ──────────────────────────────────────────────
# Credenciais do admin
# ──────────────────────────────────────────────
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin123}

# ──────────────────────────────────────────────
# Limpeza automática de salas inativas
# Tempo de vida em horas por status:
#   finalizada → partida encerrada (mantém por 2h para replay)
#   lobby      → sala abandonada antes de iniciar (1h)
#   ativa      → partida travada ou jogadores desconectados (8h)
# ──────────────────────────────────────────────
cleanup.sala.finalizada.horas=${CLEANUP_FINALIZADA_HORAS:2}
cleanup.sala.lobby.horas=${CLEANUP_LOBBY_HORAS:1}
cleanup.sala.ativa.horas=${CLEANUP_ATIVA_HORAS:8}
