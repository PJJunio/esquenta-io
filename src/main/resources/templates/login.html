<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light only">
  <title>esquenta.io — Admin</title>
  <link rel="stylesheet" th:href="@{/css/esquenta.css}">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background:#15110F;color:#FFF4E0;">

<div style="min-height:100vh;background:#15110F;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;">
  <div class="esq-halftone" style="background-image:radial-gradient(#FFB800 1.2px,transparent 1.2px);opacity:.2;"></div>

  <!-- Sticker area restrita -->
  <div class="esq-sticker" style="top:clamp(50px,8vh,80px);left:50%;transform:translateX(-50%) rotate(-6deg);animation:esq-float 4s ease-in-out infinite;">
    área restrita 🔒
  </div>

  <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:28px;padding:clamp(120px,18vh,160px) 24px 60px;width:100%;max-width:480px;">

    <!-- Title -->
    <div style="font-family:'Bagel Fat One',sans-serif;font-size:clamp(52px,12vw,72px);color:#FFB800;letter-spacing:-0.02em;text-shadow:4px 4px 0 #FF4757;line-height:0.9;text-align:center;">
      painel<br/>admin
    </div>

    <!-- Card -->
    <div style="width:100%;background:#FFFBF2;color:#15110F;border:4px solid #FFF4E0;border-radius:22px;box-shadow:6px 6px 0 #FFB800;padding:24px;display:flex;flex-direction:column;gap:16px;">

      <div th:if="${param.error}" style="background:#3a1a1a;border:2px solid #FF4757;border-radius:10px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#FF4757;">
        ⚠ Usuário ou senha incorretos.
      </div>
      <div th:if="${param.logout}" style="background:#1a3a1a;border:2px solid #2DD4BF;border-radius:10px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#2DD4BF;">
        ✓ Logout realizado com sucesso.
      </div>

      <form th:action="@{/login}" method="post" style="display:flex;flex-direction:column;gap:16px;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div>
          <div class="esq-label" style="margin-bottom:6px;color:#2A2421;">usuário</div>
          <input class="esq-input" name="username" placeholder="admin" autocomplete="username" required autofocus>
        </div>
        <div>
          <div class="esq-label" style="margin-bottom:6px;color:#2A2421;">senha</div>
          <input class="esq-input" type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="esq-btn esq-btn--red esq-btn--block" style="margin-top:4px;">ENTRAR →</button>
      </form>
    </div>

    <a th:href="@{/}" style="background:transparent;border:none;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#FFF4E0;opacity:0.7;cursor:pointer;text-decoration:none;">
      ← voltar pro jogo
    </a>
  </div>
</div>

<script th:src="@{/css/esquenta-components.js}"></script>
</body>
</html>
