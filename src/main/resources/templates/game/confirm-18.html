<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light only">
  <title>esquenta.io — Confirmação +18</title>
  <link rel="stylesheet" th:href="@{/css/esquenta.css}">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background:#FFF4E0;color:#15110F;">

<div style="min-height:100vh;background:#FFF4E0;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;">
  <div class="esq-halftone"></div>

  <!-- Diagonal red banner -->
  <div style="
    position:absolute; top:clamp(80px,12vh,110px); left:-40px; right:-40px;
    background:#FF4757; padding:14px 0; transform:rotate(-4deg);
    border:3px solid #15110F; box-shadow:4px 4px 0 #15110F; text-align:center; z-index:3;
  ">
    <div class="esq-sub" style="font-size:20px;letter-spacing:0.18em;color:#FFF4E0;">⚠ atenção · +18 · atenção ⚠</div>
  </div>

  <!-- Content column -->
  <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;gap:18px;padding:clamp(180px,26vh,220px) 24px 40px;width:100%;max-width:400px;">

    <!-- Starburst +18 -->
    <div style="animation:esq-pop 0.4s cubic-bezier(.4,1.5,.5,1);">
      <div id="starburst-18"></div>
    </div>

    <div class="esq-display" style="font-size:clamp(32px,7vw,42px);line-height:1;">
      Modo <span style="color:#FF4757;">Esquenta</span>
    </div>

    <div style="background:#FFFBF2;border:3px solid #15110F;border-radius:14px;box-shadow:4px 4px 0 #15110F;padding:18px;font-size:15px;line-height:1.5;color:#15110F;max-width:320px;">
      Esse modo tem <b>conteúdo adulto</b> e penalidades em <b style="color:#FF4757;">goles 🍻</b>. Joga só com responsa, mano. <b>Beba com moderação.</b>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:320px;margin-top:4px;">
      <a th:href="@{/game/criar-sala/esquenta}" class="esq-btn esq-btn--red esq-btn--block" style="font-size:17px;padding:17px;">
        SOU +18, BORA →
      </a>
      <a th:href="@{/game/criar-sala}" class="esq-btn esq-btn--block esq-btn--paper">
        VOLTAR
      </a>
    </div>
  </div>
</div>

<script th:src="@{/css/esquenta-components.js}"></script>
<script>
  document.getElementById('starburst-18').innerHTML = esqStarburst(170, '#FF4757',
    '<span style="color:#FFF4E0;font-size:52px;font-family:\'Bagel Fat One\',sans-serif;line-height:1;">+18</span>');
</script>
</body>
</html>
