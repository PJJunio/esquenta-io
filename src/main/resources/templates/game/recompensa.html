<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light only">
  <title>esquenta.io — Recompensa!</title>
  <link rel="stylesheet" th:href="@{/css/esquenta.css}">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body style="background:#FFB800;color:#15110F;">

<div style="min-height:100vh;background:#FFB800;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;">
  <div class="esq-halftone" style="background-image:radial-gradient(#15110F 1.2px,transparent 1.2px);opacity:.12;"></div>

  <!-- Confetti -->
  <div style="position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:10;" data-confetti="40"></div>

  <div style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;text-align:center;gap:18px;padding:40px 24px;max-width:400px;">
    <div class="esq-label" style="color:#15110F;">RECOMPENSA</div>

    <div style="animation:esq-bounce 0.6s ease-in-out infinite;">
      <div data-mascot data-size="130" data-mood="wink"></div>
    </div>

    <div id="starburst-pts"></div>

    <!-- Para MICO: sem ganho de pontos -->
    <div th:if="${cartao != null and cartao.tipo.name() == 'MICO'}" class="esq-display" style="font-size:clamp(30px,7vw,38px);">
      mico <span style="color:#FF4757;">cumprido!</span>
    </div>
    <p th:if="${cartao != null and cartao.tipo.name() == 'MICO'}" style="font-size:15px;color:#2A2421;max-width:280px;line-height:1.5;">
      <span th:if="${jogadorDaVez != null}"><b style="color:#15110F;" th:text="${jogadorDaVez.nickname}">Nick</b> cumpriu o mico</span>
      <span th:unless="${jogadorDaVez != null}">Mico cumprido</span>
      sem penalidade! 💪
    </p>

    <!-- Para PERGUNTA: mostra pontos normalmente -->
    <div th:unless="${cartao != null and cartao.tipo.name() == 'MICO'}" class="esq-display" style="font-size:clamp(30px,7vw,38px);">
      mandou <span style="color:#FF4757;">bem</span>!
    </div>
    <p th:unless="${cartao != null and cartao.tipo.name() == 'MICO'}" style="font-size:15px;color:#2A2421;max-width:280px;line-height:1.5;">
      <span th:if="${jogadorDaVez != null}"><b style="color:#15110F;" th:text="${jogadorDaVez.nickname}">Nick</b> ganhou</span>
      <span th:unless="${jogadorDaVez != null}">Você ganhou</span>
      <b style="color:#FF4757;">+<span th:text="${cartao != null ? cartao.pontosRecompensa : 10}">10</span> pontos</b>. Tá voando!
    </p>

    <!-- DE BOA: aguardando outros jogadores -->
    <div th:if="${sala.modoJogo.name() == 'DE_BOA'}" id="aguardando-bloco"
         style="display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:4px;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.08em;opacity:0.6;">
        ⏳ aguardando outros jogadores...
      </div>
    </div>

    <!-- Overlay placar (DE_BOA — aparece após round-over) -->
    <div th:if="${sala.modoJogo.name() == 'DE_BOA'}" id="placar-overlay"
         style="display:none;flex-direction:column;align-items:center;gap:10px;
                background:#15110F;border:3px solid #FFB800;border-radius:18px;
                padding:18px 24px;min-width:240px;box-shadow:4px 4px 0 #7A5700;">
      <div style="font-family:'Bagel Fat One',sans-serif;font-size:18px;color:#FFB800;">📊 Placar da rodada</div>
      <div id="placar-lista" style="display:flex;flex-direction:column;gap:6px;width:100%;"></div>
      <div id="placar-countdown" style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;opacity:0.5;margin-top:4px;">próxima em 3s...</div>
    </div>

    <!-- Countdown auto-avança (ESQUENTA) -->
    <div th:unless="${sala.modoJogo.name() == 'DE_BOA'}"
         style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:10px;">
      <div style="width:200px;height:5px;background:rgba(21,17,15,0.15);border-radius:100px;overflow:hidden;">
        <div id="auto-bar-rec" style="height:100%;width:0%;background:#15110F;transition:width 0.9s linear;border-radius:100px;"></div>
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;opacity:0.45;letter-spacing:0.08em;">
        próxima rodada em <span id="auto-sec-rec">6</span>s
      </div>
    </div>

    <a th:href="@{/sala/{id}/proximo-turno(id=${sala.id})}" id="btn-proximo-rec"
       class="esq-btn esq-btn--red esq-btn--block"
       style="max-width:320px;margin-top:8px;font-size:16px;"
       th:style="${sala.modoJogo.name() == 'DE_BOA'} ? 'display:none;max-width:320px;margin-top:8px;font-size:16px;' : 'max-width:320px;margin-top:8px;font-size:16px;'">
      PRÓXIMA RODADA →
    </a>
  </div>
</div>

<script th:src="@{/css/esquenta-components.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@6/bundles/stomp.umd.min.js"></script>
<script th:inline="javascript">
  const salaId      = /*[[${sala.id}]]*/ 1;
  const ehDeBoa     = /*[[${sala.modoJogo.name() == 'DE_BOA'}]]*/ false;
  const isMico      = /*[[${cartao != null and cartao.tipo.name() == 'MICO'}]]*/ false;
  const placarInicial = /*[(${placarJson != null ? placarJson : 'null'})]*/ null;

  if (!isMico) {
    const pts = /*[[${cartao != null ? cartao.pontosRecompensa : 10}]]*/ 10;
    const el = document.getElementById('starburst-pts');
    if (el) el.innerHTML = esqStarburst(170, '#FF4757',
      `<span style="font-family:'Bagel Fat One',sans-serif;font-size:44px;color:#FFF4E0;line-height:1;">+${pts}</span>`);
  }

  let navegando = false;
  function irProximo() {
    if (navegando) return;
    navegando = true;
    window.location.href = '/sala/' + salaId + '/proximo-turno';
  }

  // ESQUENTA: auto-avança em 6s
  let autoInt = null;
  if (!ehDeBoa) {
    let autoT = 6;
    const barEl = document.getElementById('auto-bar-rec');
    const secEl = document.getElementById('auto-sec-rec');
    setTimeout(() => { if (barEl) barEl.style.width = '100%'; }, 50);
    autoInt = setInterval(() => {
      autoT--;
      if (secEl) secEl.textContent = autoT;
      if (autoT <= 0) { clearInterval(autoInt); irProximo(); }
    }, 1000);
  }

  // Mostra overlay de placar (DE_BOA) quando round-over chega
  function mostrarPlacarOverlay(placar) {
    const overlay = document.getElementById('placar-overlay');
    const lista   = document.getElementById('placar-lista');
    const aguard  = document.getElementById('aguardando-bloco');
    const btn     = document.getElementById('btn-proximo-rec');
    if (!overlay) return;

    if (aguard) aguard.style.display = 'none';

    if (lista && placar && placar.length) {
      lista.innerHTML = placar
        .sort((a, b) => b.p - a.p)
        .map(j => `<div style="display:flex;justify-content:space-between;gap:16px;
                               font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;">
          <span style="color:#FFF4E0;">${j.n}</span>
          <span style="color:#FFB800;">${j.p} pts</span>
        </div>`).join('');
    }

    overlay.style.display = 'flex';
    if (btn) { btn.style.display = ''; }

    // Countdown 3s para avançar automaticamente
    let t = 3;
    const cdEl = document.getElementById('placar-countdown');
    const cdInt = setInterval(() => {
      t--;
      if (cdEl) cdEl.textContent = 'próxima em ' + t + 's...';
      if (t <= 0) { clearInterval(cdInt); irProximo(); }
    }, 1000);
  }

  let placarMostrado = false;

  // Placar imediato: o próprio player foi o último a responder e já tem dados
  if (placarInicial && ehDeBoa) {
    try {
      mostrarPlacarOverlay(JSON.parse(placarInicial));
      placarMostrado = true;
    } catch(e) {}
  }

  function aplicarStatus(d) {
    if (d.type === 'game-over') {
      if (autoInt) clearInterval(autoInt);
      window.location.href = '/sala/' + salaId + '/podio';
    } else if (d.type === 'round-over') {
      if (ehDeBoa && !placarMostrado) {
        placarMostrado = true;
        // d.placar pode ser array (WS / quiz-status) ou string (placarInicial)
        let placar = d.placar;
        if (typeof placar === 'string') { try { placar = JSON.parse(placar); } catch(e) {} }
        mostrarPlacarOverlay(placar);
      } else if (!ehDeBoa) {
        if (autoInt) clearInterval(autoInt);
        irProximo();
      }
    } else if (d.type === 'next-turn') {
      if (autoInt) clearInterval(autoInt);
      irProximo();
    }
  }

  // WS
  const ws = new StompJs.Client({ webSocketFactory: () => new SockJS('/ws'), reconnectDelay: 3000 });
  ws.onConnect = () => {
    ws.subscribe('/topic/partida/' + salaId, (msg) => {
      try { aplicarStatus(JSON.parse(msg.body)); } catch(e) {}
    });

    // Catch-up: busca estado atual caso evento tenha chegado antes do WS conectar
    if (ehDeBoa) {
      fetch('/sala/' + salaId + '/quiz-status')
        .then(r => r.json())
        .then(d => aplicarStatus(d))
        .catch(() => {});
    }
  };
  ws.activate();
</script>
</body>
</html>
